<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Apple Support</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body{
            background:#f5f5f7;
        }

        /* INTRO SCREEN */
        #intro{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:white;
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:9999;
            animation:fadeOut 1s ease 5s forwards;
        }

        #intro img{
            width:150px;
            animation:zoom 2s ease-in-out infinite alternate;
        }

        @keyframes zoom{
            from{transform:scale(1);}
            to{transform:scale(1.1);}
        }

        @keyframes fadeOut{
            to{opacity:0; visibility:hidden;}
        }

        /* MAIN CONTENT */
        .container{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .card{
            background:white;
            width:100%;
            max-width:420px;
            padding:40px 30px;
            border-radius:16px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
            text-align:center;
        }

        .logo{
            width:90px;
            margin-bottom:20px;
        }

        h1{
            font-size:28px;
            font-weight:600;
            color:#1d1d1f;
            margin-bottom:10px;
        }

        p{
            font-size:15px;
            color:#6e6e73;
            margin-bottom:30px;
        }

        .btn{
            display:inline-block;
            background:#0071e3;
            color:white;
            padding:14px 28px;
            border-radius:8px;
            text-decoration:none;
            font-size:16px;
            font-weight:500;
            transition:0.3s;
        }

        .btn:hover{
            background:#005bb5;
        }
    </style>
</head>
<body>

    <!-- INTRO -->
    <div id="intro">
        <img src="intro.png.webP" alt="Intro">
    </div>

    <!-- MAIN PAGE -->
    <div class="container">
        <div class="card">
            <img src="logo.png.webP" class="logo" alt="Logo">
            <h1>Apple Support</h1>
            <p>Register your complaint by yourself or with an Apple technician.</p>
            <a href="2nd.html" class="btn">Complaint Form</a>
        </div>
    </div>

</body>
</html>
