<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Apple Support</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body{
            background:#f5f5f7;
        }

        /* INTRO SCREEN */
        #intro{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:white;
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:9999;
            animation:fadeOut 1s ease 5s forwards;
        }

        #intro img{
            width:150px;
            animation:zoom 2s ease-in-out infinite alternate;
        }

        @keyframes zoom{
            from{transform:scale(1);}
            to{transform:scale(1.1);}
        }

        @keyframes fadeOut{
            to{opacity:0; visibility:hidden;}
        }

        /* MAIN CONTENT */
        .container{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .card{
            background:white;
            width:100%;
            max-width:420px;
            padding:40px 30px;
            border-radius:16px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
            text-align:center;
        }

        .logo{
            width:90px;
            margin-bottom:20px;
        }

        h1{
            font-size:28px;
            font-weight:600;
            color:#1d1d1f;
            margin-bottom:10px;
        }

        p{
            font-size:15px;
            color:#6e6e73;
            margin-bottom:30px;
        }

        .btn{
            display:block;
            width:100%;
            background:#0071e3;
            color:white;
            padding:14px 28px;
            border-radius:8px;
            text-decoration:none;
            font-size:16px;
            font-weight:500;
            transition:0.3s;
            margin-bottom:10px;
        }

        .btn:hover{
            background:#005bb5;
        }

        .or-text{
            margin:10px 0;
            color:#6e6e73;
            font-size:14px;
        }

        /* POPUP */
        #casePopup{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.4);
            display:none;
            justify-content:center;
            align-items:center;
            z-index:10000;
        }

        .popup-box{
            background:white;
            padding:25px;
            border-radius:12px;
            width:90%;
            max-width:350px;
            text-align:center;
        }

        .popup-box input{
            width:100%;
            padding:12px;
            margin:15px 0;
            border:1px solid #ccc;
            border-radius:8px;
        }

        .popup-box button{
            background:#0071e3;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:8px;
            cursor:pointer;
        }

        .popup-box button:hover{
            background:#005bb5;
        }

        .cancel-btn{
            background:#e53935;
            margin-left:10px;
        }

        .cancel-btn:hover{
            background:#c62828;
        }
    </style>
</head>
<body>

    <!-- INTRO -->
    <div id="intro">
        <img src="introo.png.WEBP" alt="Intro">
    </div>

    <!-- POPUP -->
    <div id="casePopup">
        <div class="popup-box">
            <h3>Enter Case ID</h3>
            <input type="text" id="caseId" placeholder="Enter Case ID">
            <button onclick="checkCase()">Submit</button>
            <button class="cancel-btn" onclick="cancelPopup()">Cancel</button>
        </div>
    </div>

    <!-- MAIN PAGE -->
    <div class="container">
        <div class="card">
            <img src="logo.png.WEBP" class="logo" alt="Logo">
            <h1>Apple Support</h1>
            <p>Register your complaint by yourself or with an Apple technician.</p>

            <a href="2nd.html" class="btn">Complaint Form</a>

            <div class="or-text">or</div>

            <a href="#" class="btn" onclick="openPopup()">Case ID</a>
        </div>
    </div>

    <script>
        function openPopup(){
            document.getElementById("casePopup").style.display = "flex";
        }

        function cancelPopup(){
            document.getElementById("casePopup").style.display = "none";
        }

        function checkCase(){
            let id = document.getElementById("caseId").value;

            if(id === "778249"){
                window.location.href = "jacobmiller.html";
            }
            else if(id === "556221"){
                window.location.href = "jamesrobinson.html";
            }
            else if(id === "997204"){
                window.location.href = "rodyhansen.HTML";
            }
            else if(id === "678567"){
                window.location.href = "finnmartin.html";
            }
            else{
                alert("Invalid Case ID");
            }
        }
    </script>

</body>
</html>
